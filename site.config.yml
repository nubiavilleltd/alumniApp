#  Alumnni Portal - Site Configuration
# This file contains all configurable options for your alumni portal
# Modify these values to customize your portal without touching code

# Site Information
site:
  name: 'FGGC Owerri Alumnae Association'
  description: 'Connecting generations of extraordinary women since 1966. A global sisterhood built on excellence, integrity, and service to Nigeria and beyond.'
  # url: 'https://open-alumns-portal.vercel.app'
  logo: '/fggc-logo.jpeg'
  favicon: '/favicon.ico'
  hero_image: '/hero-bg.png'

# Organization Details
organization:
  name: 'Federal Government Girls College'
  website: 'loremipsum.com'
  email: 'info@fggcowerrilagos.org'
  address: 'Lagos, Nigeria'

colors:
  primary:
    50: '#eff6ff'
    100: '#dbeafe'
    200: '#bfdbfe'
    300: '#93c5fd'
    400: '#60a5fa'
    500: '#3b82f6'
    600: '#2563eb'
    700: '#1d4ed8'
    800: '#1e40af'
    900: '#1e3a8a'

  secondary:
    50: '#fef2f2'
    100: '#fee2e2'
    200: '#fecaca'
    300: '#fca5a5'
    400: '#f87171'
    500: '#ef4444'
    600: '#dc2626'
    700: '#b91c1c'
    800: '#991b1b'
    900: '#7f1d1d'

  accent:
    50: '#f8fafc'
    100: '#f1f5f9'
