# Year Range Configuration
years:
  start: 2001
  end: 2025
  current_year: 2025

# Social Media Links
social_links:
  - name: 'LinkedIn'
    url: 'https://linkedin.com/'
    icon: 'linkedin'
    color: '#0077b5'
  - name: 'Twitter'
    url: 'https://twitter.com/'
    icon: 'twitter'
    color: '#1da1f2'
  - name: 'Facebook'
    url: 'https://facebook.com/'
    icon: 'facebook'
    color: '#1877f2'

# SEO Configuration
seo:
  title_template: '%s | FGGC Owerri Alumni'
  default_description: 'Connect with alumni from your institution. Join our network and stay updated with events, news, and opportunities.'
  keywords: ['alumni', 'portal', 'network', 'community', 'education', 'graduates']
  author: 'Federal Government Girls College Alumnae Association'
  og_image: '/og-image.jpg'
  twitter_card: 'summary_large_image'

# Content Configuration
content:
  posts_per_page: 12
  alumni_per_page: 3
  events_per_page: 10
  featured_alumni_count: 3
  latest_events_count: 4

# Features
features:
  search: true
  filters: true
  pagination: true
  tags: true
  categories: true
  social_sharing: true
  contact_forms: true
  newsletter: true
  alumni_registration:
    enabled: false
    url: '/alumni/register' # Google Form or Registration Page URL

# Contact Information
contact:
  email: 'lorem_ipsum@gmail.com'
  phone: '+7777777777'
  address: 'Lagos, Nigeria'
  office_hours: 'Monday - Friday, 9:00 AM - 5:00 PM'
