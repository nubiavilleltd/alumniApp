# Chapter Configuration
chapters:
  - name: 'Software Engineering'
    slug: 'software'
    description: 'Computer Science and Software Engineering graduates'
    icon: 'code'
    color: '#22c55e'
  - name: 'Computer Engineering'
    slug: 'computer'
    description: 'Computer Engineering and IT graduates'
    icon: 'microchip'
    color: '#3b82f6'
  - name: 'Electronics Engineering'
    slug: 'electronics'
    description: 'Electronics and Communication Engineering graduates'
    icon: 'bolt'
    color: '#f59e0b'
  - name: 'Civil Engineering'
    slug: 'civil'
    description: 'Civil and Infrastructure Engineering graduates'
    icon: 'building'
    color: '#8b5cf6'
  - name: 'Mechanical Engineering'
    slug: 'mechanical'
    description: 'Mechanical and Industrial Engineering graduates'
    icon: 'cog'
    color: '#ef4444'

# Year Range Configuration
years:
  start: 2001
  end: 2025
  current_year: 2025

# Social Media Links
social_links:
  - name: 'GitHub'
    url: 'https://github.com/noskofficial/open-alumns'
    icon: 'github'
    color: '#171515'
  - name: 'LinkedIn'
    url: 'https://linkedin.com/company/officialnosk'
    icon: 'linkedin'
    color: '#0077b5'
  - name: 'Twitter'
    url: 'https://twitter.com/officialnosk'
    icon: 'twitter'
    color: '#1da1f2'
  - name: 'Facebook'
    url: 'https://facebook.com/nosklub'
    icon: 'facebook'
    color: '#1877f2'

# SEO Configuration
seo:
  title_template: '%s | FGGC Owerri Alumni'
  default_description: 'Connect with alumni from your institution. Join our network and stay updated with events, news, and opportunities.'
  keywords: ['alumni', 'portal', 'network', 'community', 'education', 'graduates']
  author: 'Nepal Open Source Klub (NOSK)'
  og_image: '/og-image.jpg'
  twitter_card: 'summary_large_image'

# Content Configuration
content:
  posts_per_page: 12
  alumni_per_page: 3
  events_per_page: 10
  featured_alumni_count: 3
  latest_events_count: 4

# Features
features:
  search: true
  filters: true
  pagination: true
  tags: true
  categories: true
  social_sharing: true
  contact_forms: true
  newsletter: true
  alumni_registration:
    enabled: false
    url: '/alumni/register' # Google Form or Registration Page URL

# Contact Information
contact:
  email: 'lorem_ipsum@gmail.com'
  phone: '+7777777777'
  address: 'Lagos, Nigeria'
  office_hours: 'Monday - Friday, 9:00 AM - 5:00 PM'
